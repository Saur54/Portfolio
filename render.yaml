services:
  - type: web
    name: saurabh
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    preDeployCommand: python manage.py migrate
    startCommand: gunicorn django_portfolio.wsgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: saurabh-postgres
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.13.1"
databases:
  - name: saurabh-postgres
    databaseName: saurabh_portfolio
    region: singapore
    plan: free
