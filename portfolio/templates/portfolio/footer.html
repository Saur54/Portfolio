<!-- FOOTER -->
<footer>
  <div class="container">
    <div class="footer-inner">
      <a class="logo footer-logo" href="/#home">
        <div class="logo-icon"><span>{</span>S<span>}</span></div>
        <div>
          <div class="logo-name">Saurabh</div>
          <div class="logo-sub">{% if home %}{{ home.profession }}{% else %}Software Developer{% endif %}</div>
        </div>
      </a>
      <div class="footer-copy">© {% now "Y" %} Saurabh. All Rights Reserved.</div>
      <div class="social-links">
        {% for link in social_links %}
        <a href="{{ link.url }}" class="slink" title="{{ link.name }}" target="_blank"><i class="{{ link.icon }}"></i></a>
        {% empty %}
        <span style="color: var(--muted); font-size: 13px;">No social links added yet.</span>
        {% endfor %}
      </div>
    </div>
  </div>
</footer>

<button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})"><i class="fas fa-arrow-up"></i></button>
