{% extends 'portfolio/base.html' %}
{% load static %}

{% block content %}

<section class="section" style="padding-top: 130px; min-height: 100vh;">
    <div class="container" style="max-width: 860px; margin: 0 auto;">

        <!-- Back Button -->
        <a href="{% url 'blog_list' %}" style="display: inline-flex; align-items: center; gap: 10px; color: var(--accent); text-decoration: none; font-size: 14px; font-weight: 600; margin-bottom: 40px; letter-spacing: 1px; text-transform: uppercase; transition: 0.3s;">
            <i class="fas fa-arrow-left"></i> Back to Blog
        </a>

        <!-- Blog Header -->
        <div>
            <div class="blog-date" style="font-size: 13px; color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px;">
                <i class="fas fa-calendar-alt" style="margin-right: 6px;"></i> {{ blog.date_posted|date:"F d, Y" }}
            </div>
            <h1 style="font-size: clamp(28px, 5vw, 48px); font-weight: 800; color: #fff; line-height: 1.2; margin-bottom: 30px;">{{ blog.title }}</h1>
            <p style="font-size: 18px; color: var(--muted); line-height: 1.8; border-left: 3px solid var(--accent); padding-left: 20px; margin-bottom: 40px; font-style: italic;">{{ blog.description }}</p>
        </div>

        <!-- Featured Image -->
        {% if blog.image %}
        <div style="width: 100%; border-radius: 20px; overflow: hidden; margin-bottom: 50px; border: 1px solid rgba(255,255,255,0.08);">
            <img src="{{ blog.image.url }}" alt="{{ blog.title }}" style="width: 100%; max-height: 450px; object-fit: cover; display: block;">
        </div>
        {% endif %}

        <!-- Blog Content -->
        <div class="blog-content-body" style="color: rgba(255,255,255,0.75); font-size: 16px; line-height: 1.9;">
            {{ blog.content|safe }}
        </div>

        <!-- Share Section -->
        <div style="margin-top: 60px; padding-top: 40px; border-top: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; gap: 20px; flex-wrap: wrap;">
            <span style="color: var(--muted); font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">Share This Post:</span>
            <a href="https://twitter.com/intent/tweet?text={{ blog.title }}&url={{ request.build_absolute_uri }}" target="_blank" style="width: 40px; height: 40px; background: rgba(29,161,242,0.1); border: 1px solid rgba(29,161,242,0.3); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #1da1f2; font-size: 16px; text-decoration: none; transition: 0.3s;" onmouseover="this.style.background='#1da1f2'; this.style.color='#fff'" onmouseout="this.style.background='rgba(29,161,242,0.1)'; this.style.color='#1da1f2'">
                <i class="fab fa-twitter"></i>
            </a>
            <a href="https://www.linkedin.com/shareArticle?mini=true&url={{ request.build_absolute_uri }}&title={{ blog.title }}" target="_blank" style="width: 40px; height: 40px; background: rgba(0,119,181,0.1); border: 1px solid rgba(0,119,181,0.3); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #0077b5; font-size: 16px; text-decoration: none; transition: 0.3s;" onmouseover="this.style.background='#0077b5'; this.style.color='#fff'" onmouseout="this.style.background='rgba(0,119,181,0.1)'; this.style.color='#0077b5'">
                <i class="fab fa-linkedin-in"></i>
            </a>
        </div>

    </div>
</section>

<style>
/* Blog Detail Typography */
.blog-content-body h2 { font-size: 28px; font-weight: 700; color: #fff; margin: 40px 0 15px; }
.blog-content-body h3 { font-size: 22px; font-weight: 700; color: #fff; margin: 30px 0 12px; }
.blog-content-body p { margin-bottom: 20px; }
.blog-content-body img { max-width: 100%; border-radius: 12px; margin: 20px 0; }
.blog-content-body a { color: var(--accent); text-decoration: underline; }
.blog-content-body ul, .blog-content-body ol { padding-left: 25px; margin-bottom: 20px; }
.blog-content-body li { margin-bottom: 10px; }
.blog-content-body blockquote { border-left: 3px solid var(--accent); padding: 15px 25px; background: rgba(139,128,249,0.05); border-radius: 0 10px 10px 0; margin: 25px 0; color: var(--muted); font-style: italic; }
.blog-content-body pre { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.08); padding: 20px; border-radius: 12px; overflow-x: auto; margin: 25px 0; font-size: 14px; }
.blog-content-body code { background: rgba(139,128,249,0.15); padding: 2px 8px; border-radius: 5px; font-size: 14px; color: var(--accent); }
</style>

{% endblock %}
