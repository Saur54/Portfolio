{% load i18n static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Saurabh Admin</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #8b80f9;
            --accent-dark: #6358c5;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://images.unsplash.com/photo-1497215728101-856f4ea42174?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        .logo-section h1 {
            color: #fff;
            font-weight: 700;
            font-size: 24px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .logo-section h1 span { color: var(--accent); }

        h2 {
            color: #fff;
            font-weight: 600;
            letter-spacing: 1.5px;
            margin-bottom: 35px;
            font-size: 1.3rem;
            text-transform: uppercase;
        }

        .form-label { 
            color: rgba(255, 255, 255, 0.8); 
            font-size: 0.85rem; 
            margin-bottom: 8px;
            display: block;
        }

        /* Django Form Input Fixes */
        input[type="text"], input[type="password"] {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            border-radius: 10px !important;
            color: #fff !important;
            padding: 12px 15px !important;
            width: 100% !important;
            margin-bottom: 25px !important;
            transition: 0.3s;
        }
        
        input:focus {
            outline: none !important;
            border-color: var(--accent) !important;
            background: rgba(255, 255, 255, 0.1) !important;
            box-shadow: 0 0 15px rgba(139, 128, 249, 0.2) !important;
        }

        .btn-login {
            background: linear-gradient(45deg, var(--accent), var(--accent-dark));
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-weight: 700;
            color: white;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(139, 128, 249, 0.4);
            color: white;
            opacity: 0.9;
        }

        .errornote {
            background: rgba(220, 53, 69, 0.25);
            color: #ff8686;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 25px;
            border: 1px solid rgba(220, 53, 69, 0.3);
        }
        
        .footer-link {
            margin-top: 25px;
            font-size: 0.85rem;
        }
        
        .footer-link a {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            transition: 0.2s;
        }
        
        .footer-link a:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo-section">
        <h1>SAURABH<span>ADMIN</span></h1>
    </div>
    
    <h2>ADMIN LOGIN</h2>

    {% if form.errors %}
        <div class="errornote">{% trans "Invalid username or password." %}</div>
    {% endif %}

    <form action="{{ app_path }}" method="post">
        {% csrf_token %}
        <div class="text-start">
            <label class="form-label">Username</label>
            {{ form.username }}
        </div>
        
        <div class="text-start">
            <label class="form-label">Password</label>
            {{ form.password }}
        </div>

        <button type="submit" class="btn btn-login">Log In</button>
    </form>
    
    <div class="footer-link">
        <a href="/">← Return to Website</a>
    </div>
</div>

</body>
</html>
